version: "3.9"

services:
  app:
    build: .
    container_name: notes-app
    ports:
    - "5000:5000"
    environment:
      - MONGO_URL=mongodb://mongo:27017/notes-db
      - JWT_SECRET=mysecretpassword
      - PORT=5000
    depends_on:
      - mongo
  
  mongo:
    image: mongo:6
    container_name: mongo-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: